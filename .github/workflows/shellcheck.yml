name: Shell Script Checks

on:
  pull_request:
    branches: [main]
    paths:
      - 'backup'
      - 'tests/**'
      - '.github/workflows/shellcheck.yml'

jobs:
  lint:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run ShellCheck
        run: shellcheck backup tests/backup.bats

      - name: Run shfmt
        run: docker run --rm -v "$PWD:/mnt" mvdan/shfmt:v3 -i 2 -sr -ci -d /mnt/backup /mnt/tests/backup.bats
