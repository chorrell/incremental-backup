name: Shell Script Checks

on:
  pull_request:
    branches: [main]
    paths:
      - 'backup'
      - 'tests/**'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Shellcheck
        run: |
          shellcheck backup
          shellcheck tests/backup.bats
  
  shfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run shfmt
        run: docker run --rm -v "$PWD:/mnt" mvdan/shfmt:v3 -i 2 -sr -ci -d /mnt/backup /mnt/tests/backup.bats
